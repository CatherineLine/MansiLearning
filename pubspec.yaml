  sembast: ^3.4.0
  sembast_web: ^2.1.0
  intl: 0.19.0
  file_picker: ^8.0.0
  web: ^0.5.0
  js:
  js_interop:
  path_provider: ^2.0.11  # Версия, совместимая с SDK 34
  flutter_plugin_android_lifecycle: ^2.0.6
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  flutter_tts: ^3.8.5
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  syncfusion_flutter_pdf: ^24.1.41
  pdf: ^3.10.7
  share_plus: ^7.2.1
  #open_file: ^3.3.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
